<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#132352"/>
      <stop offset="55%" stop-color="#0c1636"/>
      <stop offset="100%" stop-color="#070d20"/>
    </radialGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3ef0c8"/>
      <stop offset="55%" stop-color="#7ee87a"/>
      <stop offset="100%" stop-color="#c8f43e"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd35e"/>
      <stop offset="100%" stop-color="#d99a12"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="22" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSm" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- zemin devre izleri (köşelerde, çok soluk) -->
  <g stroke="#35e0ff" stroke-width="7" opacity="0.12" fill="none" stroke-linecap="round">
    <path d="M60 200h130l70 70v110"/>
    <path d="M964 240h-110l-60 60"/>
    <path d="M120 860h150l80-80"/>
    <path d="M904 820h-130l-60-60v-90"/>
    <circle cx="260" cy="380" r="12" fill="#35e0ff" stroke="none"/>
    <circle cx="794" cy="300" r="12" fill="#35e0ff" stroke="none"/>
    <circle cx="350" cy="780" r="12" fill="#35e0ff" stroke="none"/>
    <circle cx="714" cy="670" r="12" fill="#35e0ff" stroke="none"/>
  </g>

  <!-- şarj halkası (üstte boşluklu gösterge yayı) -->
  <g filter="url(#glowSm)">
    <circle cx="512" cy="512" r="330" fill="none" stroke="#0a2438" stroke-width="58"/>
    <path d="M 512 182 A 330 330 0 1 0 512 182" fill="none"/>
    <path d="M 615 197 A 330 330 0 1 1 409 197" fill="none" stroke="url(#ring)" stroke-width="58" stroke-linecap="round"/>
  </g>

  <!-- şimşek -->
  <g filter="url(#glow)">
    <path d="M566 200 L360 560 h130 L458 824 L676 452 h-134 Z" fill="url(#bolt)"/>
  </g>
  <path d="M566 200 L360 560 h130 L458 824 L676 452 h-134 Z" fill="none" stroke="#eaffef" stroke-width="10" stroke-linejoin="round" opacity="0.55"/>
</svg>
